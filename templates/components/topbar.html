<header class="h-16 border-b border-borderWazuh bg-panel flex items-center justify-between px-6 shrink-0 sticky top-0 z-50">
    <div class="flex items-center gap-4">
        <h2 id="header-title" class="text-xl font-semibold text-textMain tracking-tight">Security Events</h2>
        <span class="text-xs text-textMuted bg-dark px-2 py-1 rounded border border-borderWazuh" id="header-subtitle">Real-time authentication monitoring</span>
    </div>
    
    <div class="flex items-center gap-3">
        <div class="flex items-center bg-dark border border-borderWazuh rounded text-xs text-textMain overflow-hidden">
            <span class="px-3 py-1.5 border-r border-borderWazuh bg-panel"><i class="fa-regular fa-clock mr-2"></i> Time</span>
            <span class="px-3 py-1.5">Last 24 hours</span>
        </div>
        <button onclick="fetchActiveData()" class="p-1.5 px-3 rounded bg-primary hover:bg-accent text-white transition-colors text-xs font-medium flex items-center gap-2">
            <i class="fa-solid fa-rotate-right" id="refresh-icon"></i> Refresh
        </button>
    </div>
</header>
